services:
  # 1. Backend Web Service
  - type: web
    name: jana-bikas-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false # Set this in the Render Dashboard
      - key: JWT_SECRET
        sync: false # Set this in the Render Dashboard
      - key: STRIPE_SECRET_KEY
        sync: false # Set this in the Render Dashboard
      - key: STRIPE_WEBHOOK_SECRET
        sync: false # Set this in the Render Dashboard

  # 2. Frontend Static Site
  - type: web
    name: jana-bikas-frontend
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        src: /*
        dest: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://jana-bikas-backend.onrender.com/api # Replace with your real Render Backend URL
